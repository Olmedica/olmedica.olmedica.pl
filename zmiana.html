<!doctype html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Szyfrowanie</title>
<style>
body { background-color:#0b0b0b; color:#f00; font-family: monospace; text-align:center; padding-top:50px; }
h1 { color:#ff3333; font-size:28px; }
#log { text-align:left; margin:0 auto; width:80%; max-width:800px; height:300px; overflow:auto; border:1px solid #ff0000; padding:10px; background:#111; }
#progress { width:80%; max-width:800px; height:25px; border:1px solid #f00; margin:20px auto; background:#222; }
#bar { height:100%; width:0%; background:#f00; }
</style>
</head>
<body>
<h1>⚠ Szyfrowanie urządzenia ⚠</h1>
<div id="log"></div>
<div id="progress"><div id="bar"></div></div>

<script>
const log = document.getElementById('log');
const bar = document.getElementById('bar');
const steps = [
  "Wyszukiwanie wrażliwych danych...",
  "Skanowanie systemu...",
  "Analiza sieci...",
  "Kompilacja pakietu danych...",
  "Szyfrowanie informacji...",
  "Finalizacja..."
];

let i = 0;

function step() {
  if(i < steps.length){
    log.innerHTML += "[*] " + steps[i] + "<br>";
    bar.style.width = ((i+1)/steps.length*100) + "%";
    i++;
    setTimeout(step, 1500);
    log.scrollTop = log.scrollHeight;
  } else {
    log.innerHTML += "<br>[OK] Szyfrowanie zakończone.";
    bar.style.width = "100%";
  }
}
step();
</script>
</body>
</html>
